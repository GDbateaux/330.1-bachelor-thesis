name: Swift

on: push

jobs:
  build:
    name: Swift on ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v7
      - name: Set up Swift
        uses: SwiftyLab/setup-swift@latest
      - name: Compile Carl file
        run: swift run Carl Tests/CarlTests/CompilerTests/positive/game-of-life.carl -o game-of-life
